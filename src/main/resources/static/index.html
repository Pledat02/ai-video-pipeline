<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Video Pipeline — Dashboard</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar__brand">
        <span class="topbar__logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
        </span>
        <div>
          <h1>AI Video Pipeline</h1>
          <p class="topbar__subtitle">Dashboard vận hành</p>
        </div>
      </div>
      <div class="topbar__status" id="connectionStatus" role="status" aria-live="polite">
        <span class="dot dot--ok" aria-hidden="true"></span>
        <span>Đang kết nối</span>
      </div>
    </header>

    <main class="main">
      <section class="panel panel--list" aria-labelledby="jobsHeading">
        <form id="createJobForm" class="create-form" novalidate>
          <label for="topicInput" class="create-form__label">Tạo job mới</label>
          <div class="create-form__row">
            <input
              type="text"
              id="topicInput"
              name="topic"
              maxlength="500"
              placeholder="VD: Truyện Thạch Sanh kể theo phong cách kinh dị nhẹ"
              autocomplete="off"
              required
            />
            <button type="submit" class="btn btn--primary" id="createJobBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              <span>Tạo job</span>
            </button>
          </div>
          <p class="create-form__error" id="createJobError" role="alert" hidden></p>
        </form>

        <div class="panel__header">
          <h2 id="jobsHeading">Danh sách job</h2>
          <span class="panel__count" id="jobCount">0</span>
        </div>

        <ul class="job-list" id="jobList" aria-live="polite"></ul>

        <div class="empty-state" id="emptyState" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
          <p>Chưa có job nào. Tạo job đầu tiên ở form phía trên.</p>
        </div>
      </section>
    </main>
  </div>

  <!-- Drawer chi tiết job -->
  <div class="drawer-backdrop" id="drawerBackdrop" hidden></div>
  <aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-labelledby="drawerTitle" hidden>
    <div class="drawer__header">
      <div>
        <p class="drawer__eyebrow">Job #<span id="drawerJobId"></span></p>
        <h2 id="drawerTitle"></h2>
      </div>
      <button type="button" class="btn-icon" id="drawerClose" aria-label="Đóng">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>

    <div class="drawer__body">
      <div class="drawer__meta">
        <span class="badge" id="drawerStatusBadge"></span>
        <span class="drawer__timestamp" id="drawerTimestamp"></span>
      </div>

      <div class="alert alert--error" id="drawerErrorBox" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        <p id="drawerErrorText"></p>
      </div>

      <div class="alert alert--success" id="drawerCompletedBox" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        <p>Hoàn thành! <span id="drawerYoutubeId"></span></p>
      </div>

      <video id="drawerVideoPlayer" class="drawer__video" controls preload="metadata" hidden></video>

      <div class="drawer__progress" id="drawerProgressBox" hidden>
        <span class="spinner" aria-hidden="true"></span>
        <p>Đang xử lý ở bước <strong id="drawerProgressStep"></strong>, tự làm mới...</p>
      </div>

      <label for="scriptTextarea" class="drawer__label">Kịch bản</label>
      <textarea id="scriptTextarea" rows="14" placeholder="Kịch bản sẽ hiện ở đây sau khi sinh xong..."></textarea>
      <p class="drawer__hint" id="scriptHint"></p>

      <div class="bg-upload">
        <label for="backgroundImageInput" class="drawer__label">Ảnh cho video (tuỳ chọn, chọn nhiều để tạo slideshow)</label>
        <div class="bg-upload__row">
          <input type="file" id="backgroundImageInput" accept="image/png,image/jpeg,image/webp" multiple />
          <button type="button" class="btn btn--secondary" id="uploadBackgroundBtn">Upload</button>
        </div>
        <div class="bg-upload__preview-grid" id="backgroundPreviewGrid"></div>
        <p class="drawer__hint">Thời lượng hiển thị mỗi ảnh sẽ chia đều theo độ dài audio. Không upload thì dùng nền màu mặc định.</p>
      </div>
    </div>

    <div class="drawer__footer" id="drawerActions"></div>
  </aside>

  <div class="toast-region" id="toastRegion" aria-live="polite"></div>

  <script src="/js/app.js"></script>
</body>
</html>
