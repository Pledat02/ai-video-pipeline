<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thư viện nhân vật — AI Video Studio</title>
  <meta name="description" content="Tạo và lưu nhân vật dùng chung cho nhiều video, chọn khi tạo hoặc sản xuất lại để nhân vật xuất hiện nhất quán." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="film-grain" aria-hidden="true"></div>

  <div class="app">
    <!-- ===== HEADER ===== -->
    <header class="topbar">
      <div class="topbar__brand">
        <div class="topbar__logo-wrap">
          <div class="topbar__logo" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.2 6 3 11l-.9-2.4c-.3-1.1.3-2.2 1.3-2.5l13.5-4c1-.3 2.1.3 2.4 1.4Z"></path>
              <path d="m6.2 5.3 3.1 3.9"></path>
              <path d="m12.4 3.4 3.1 4"></path>
              <path d="M3 11h18v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"></path>
            </svg>
          </div>
          <div class="topbar__logo-ring" aria-hidden="true"></div>
        </div>
        <div>
          <h1>Thư viện nhân vật</h1>
          <p class="topbar__subtitle">
            <span class="topbar__subtitle-icon" aria-hidden="true">🎭</span>
            Tạo nhân vật, dùng lại cho nhiều video
          </p>
        </div>
      </div>
      <div class="topbar__right">
        <a class="btn btn--secondary btn--3d" href="/index.html">
          <span aria-hidden="true">🎬</span><span>Về Dashboard</span>
        </a>
      </div>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main">
      <section class="hero-section">
        <div class="hero-section__inner">
          <div class="hero-section__film-strip" aria-hidden="true">
            <div class="film-hole"></div>
            <div class="film-hole"></div>
            <div class="film-hole"></div>
            <div class="film-hole"></div>
            <div class="film-hole"></div>
          </div>
          <form id="createCharacterForm" class="create-form" novalidate>
            <div class="create-form__header">
              <span class="create-form__icon" aria-hidden="true">🎭</span>
              <label for="characterNameInput" class="create-form__label">Tạo nhân vật mới</label>
            </div>
            <div class="create-form__row">
              <div class="create-form__input-wrap">
                <input
                  type="text"
                  id="characterNameInput"
                  maxlength="200"
                  placeholder="VD: Raiku Hoshino - tiền đạo chủ lực"
                  autocomplete="off"
                  required
                />
                <div class="create-form__input-glow" aria-hidden="true"></div>
              </div>
              <button type="submit" class="btn btn--primary btn--3d" id="createCharacterBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                <span>Tạo nhân vật</span>
              </button>
            </div>
            <div class="create-form__field create-form__field--wide" style="margin-top: 16px">
              <label for="characterDescriptionInput">Mô tả ngoại hình / trang phục (càng chi tiết càng nhất quán)</label>
              <textarea id="characterDescriptionInput" rows="4" placeholder="VD: Nam thanh niên tóc đen ngắn nhuộm sọc xanh điện, mắt hổ phách, áo đấu số 9 xanh navy phối trắng-cyan, quấn băng trắng ống chân trái, vòng tay hạt gỗ..."></textarea>
            </div>
            <div class="create-form__field create-form__field--wide" style="margin-top: 14px">
              <label for="characterImageInput">Ảnh đại diện (tuỳ chọn - chỉ để nhận diện trong thư viện)</label>
              <input type="file" id="characterImageInput" accept="image/png,image/jpeg,image/webp" />
            </div>
            <div class="create-form__grid" style="margin-top: 14px">
              <div class="create-form__field">
                <label for="characterFaceImageInput">Ảnh khuôn mặt</label>
                <input type="file" id="characterFaceImageInput" accept="image/png,image/jpeg,image/webp" />
              </div>
              <div class="create-form__field">
                <label for="characterFullBodyImageInput">Ảnh toàn thân</label>
                <input type="file" id="characterFullBodyImageInput" accept="image/png,image/jpeg,image/webp" />
              </div>
              <div class="create-form__field">
                <label for="characterOutfitImageInput">Ảnh trang phục</label>
                <input type="file" id="characterOutfitImageInput" accept="image/png,image/jpeg,image/webp" />
              </div>
              <div class="create-form__field">
                <label for="characterStoryboardImageInput">Storyboard mặc định · lưới 12 ô</label>
                <input type="file" id="characterStoryboardImageInput" accept="image/png,image/jpeg,image/webp" />
              </div>
            </div>
            <p class="create-form__error" id="createCharacterError" role="alert" hidden></p>
          </form>
          <div class="hero-section__film-strip hero-section__film-strip--right" aria-hidden="true">
            <div class="film-hole"></div>
            <div class="film-hole"></div>
            <div class="film-hole"></div>
            <div class="film-hole"></div>
            <div class="film-hole"></div>
          </div>
        </div>
      </section>

      <section class="panel panel--list" aria-labelledby="charactersHeading">
        <div class="panel__header">
          <div class="panel__header-left">
            <span class="panel__header-icon" aria-hidden="true">🎭</span>
            <h2 id="charactersHeading">Nhân vật đã lưu</h2>
          </div>
          <span class="panel__count" id="characterCount">0</span>
        </div>

        <div class="character-grid" id="characterGrid"></div>

        <div class="empty-state" id="emptyCharacterState" hidden>
          <div class="empty-state__icon" aria-hidden="true">🎭</div>
          <h3>Chưa có nhân vật nào</h3>
          <p>Tạo nhân vật đầu tiên ở form phía trên để dùng lại cho nhiều video.</p>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <span>🎬</span>
      <span>AI Video Studio</span>
      <span class="app-footer__divider">·</span>
      <span>Powered by AI</span>
    </footer>
  </div>

  <div class="toast-region" id="toastRegion" aria-live="polite"></div>

  <script src="/js/characters.js"></script>
</body>
</html>
